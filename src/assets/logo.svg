<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="#0a0a0a"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#grad)" stroke-width="2.5"/>

  <!-- Inner dashed ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="url(#grad)" stroke-width="0.7" stroke-dasharray="3,6" opacity="0.4"/>

  <!-- Crown shape (3 peaks) -->
  <polygon
    points="58,88 72,60 86,78 100,50 114,78 128,60 142,88 142,100 58,100"
    fill="url(#grad)"
  />

  <!-- Crown base highlight -->
  <rect x="58" y="96" width="84" height="6" rx="1" fill="url(#grad)" opacity="0.7"/>

  <!-- Gem dots on crown valleys -->
  <circle cx="86" cy="79" r="3.5" fill="#0a0a0a" stroke="url(#grad)" stroke-width="1"/>
  <circle cx="114" cy="79" r="3.5" fill="#0a0a0a" stroke="url(#grad)" stroke-width="1"/>
  <circle cx="100" cy="52" r="4" fill="#0a0a0a" stroke="url(#grad)" stroke-width="1"/>

  <!-- Divider above REX -->
  <rect x="65" y="108" width="70" height="0.7" fill="url(#gradH)" opacity="0.5"/>

  <!-- REX -->
  <text
    x="100" y="135"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="bold"
    fill="white"
    letter-spacing="10"
  >REX</text>

  <!-- Divider below REX -->
  <rect x="62" y="143" width="76" height="0.7" fill="url(#gradH)"/>

  <!-- BARBER CO. -->
  <text
    x="100" y="160"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#6b7280"
    letter-spacing="5.5"
  >BARBER CO.</text>
</svg>
